<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Gerando DOCX...</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body{font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;
       justify-content:center;min-height:100vh;background:#fefce8;gap:16px;margin:0}
  h2{color:#b45309;font-size:20px;margin:0}
  p{color:#92400e;font-size:14px;margin:0;text-align:center;max-width:420px}
  button{padding:14px 28px;background:#16a34a;color:#fff;border:none;border-radius:12px;
         font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.3)}
  button:hover{background:#15803d}
  button:disabled{opacity:.5;cursor:not-allowed}
  .logo{font-size:28px;font-weight:700;color:#b45309}
  .logo span{color:#0e7490}
</style>
</head>
<body>
<div class="logo">Vacar<span>IA</span></div>
<h2>Gerando documento editável...</h2>
<p id="msg">Processando conteúdo...</p>
<button id="btn" disabled>⬇ Baixar DOCX</button>

<script>
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&')
    .replace(/</g, '<')
    .replace(/>/g, '>')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function inlineRuns(s) {
  var parts = String(s).split(/(\*\*[^*]+\*\*)/g);
  return parts.map(function(p) {
    if (p.startsWith('**') && p.endsWith('**')) {
      return '<w:r><w:rPr><w:b/></w:rPr><w:t xml:space="preserve">' + esc(p.slice(2,-2)) + '</w:t></w:r>';
    }
    return p ? '<w:r><w:t xml:space="preserve">' + esc(p) + '</w:t></w:r>' : '';
  }).join('');
}

function lineToPara(line) {
  var s = line.trim();

  if (s.startsWith('# ')) {
    return '<w:p><w:pPr><w:pStyle w:val="H1"/><w:spacing w:before="280" w:after="120"/></w:pPr>'
      + inlineRuns(s.slice(2)) + '</w:p>';
  }
  if (s.startsWith('## ')) {
    return '<w:p><w:pPr><w:pStyle w:val="H2"/><w:spacing w:before="200" w:after="80"/></w:pPr>'
      + inlineRuns(s.slice(3)) + '</w:p>';
  }
  if (s.startsWith('### ')) {
    return '<w:p><w:pPr><w:pStyle w:val="H3"/><w:spacing w:before="160" w:after="60"/></w:pPr>'
      + inlineRuns(s.slice(4)) + '</w:p>';
  }
  if (s.startsWith('• ') || s.startsWith('- ')) {
    return '<w:p><w:pPr><w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr>'
      + '<w:spacing w:before="40" w:after="40"/></w:pPr>'
      + inlineRuns(s.slice(2)) + '</w:p>';
  }
  if (s === '---') {
    return '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="D1D5DB"/>'
      + '</w:pBdr><w:spacing w:before="80" w:after="80"/></w:pPr></w:p>';
  }
  if (s === '' || s.startsWith('═')) {
    return '<w:p><w:pPr><w:spacing w:before="60" w:after="60"/></w:pPr></w:p>';
  }
  return '<w:p><w:pPr><w:spacing w:before="40" w:after="40"/></w:pPr>'
    + inlineRuns(s) + '</w:p>';
}

async function buildDocx(text, filename) {
  var zip = new JSZip();

  zip.file('[Content_Types].xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>' +
    '<Override PartName="/word/document.xml"' +
    ' ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
    '<Override PartName="/word/styles.xml"' +
    ' ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>' +
    '<Override PartName="/word/numbering.xml"' +
    ' ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/>' +
    '</Types>'
  );

  zip.folder('_rels').file('.rels',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1"' +
    ' Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument"' +
    ' Target="word/document.xml"/>' +
    '</Relationships>'
  );

  zip.folder('word').folder('_rels').file('document.xml.rels',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1"' +
    ' Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles"' +
    ' Target="styles.xml"/>' +
    '<Relationship Id="rId2"' +
    ' Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering"' +
    ' Target="numbering.xml"/>' +
    '</Relationships>'
  );

  zip.folder('word').file('styles.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"' +
    ' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
    '<w:docDefaults><w:rPrDefault><w:rPr>' +
    '<w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/>' +
    '<w:sz w:val="22"/><w:szCs w:val="22"/><w:color w:val="1E293B"/>' +
    '</w:rPr></w:rPrDefault></w:docDefaults>' +

    '<w:style w:type="paragraph" w:default="1" w:styleId="Normal">' +
    '<w:name w:val="Normal"/>' +
    '<w:pPr><w:spacing w:after="80" w:line="276" w:lineRule="auto"/></w:pPr>' +
    '<w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial" w:cs="Arial"/><w:sz w:val="22"/></w:rPr>' +
    '</w:style>' +

    '<w:style w:type="paragraph" w:styleId="H1">' +
    '<w:name w:val="heading 1"/><w:basedOn w:val="Normal"/>' +
    '<w:pPr><w:spacing w:before="280" w:after="120"/>' +
    '<w:pBdr><w:bottom w:val="single" w:sz="4" w:space="4" w:color="FDE68A"/></w:pBdr></w:pPr>' +
    '<w:rPr><w:b/><w:sz w:val="32"/><w:szCs w:val="32"/><w:color w:val="B45309"/></w:rPr>' +
    '</w:style>' +

    '<w:style w:type="paragraph" w:styleId="H2">' +
    '<w:name w:val="heading 2"/><w:basedOn w:val="Normal"/>' +
    '<w:pPr><w:spacing w:before="200" w:after="80"/></w:pPr>' +
    '<w:rPr><w:b/><w:sz w:val="24"/><w:szCs w:val="24"/><w:color w:val="0E7490"/>' +
    '<w:caps/></w:rPr>' +
    '</w:style>' +

    '<w:style w:type="paragraph" w:styleId="H3">' +
    '<w:name w:val="heading 3"/><w:basedOn w:val="Normal"/>' +
    '<w:pPr><w:spacing w:before="160" w:after="60"/></w:pPr>' +
    '<w:rPr><w:b/><w:sz w:val="22"/><w:szCs w:val="22"/><w:color w:val="7C3AED"/></w:rPr>' +
    '</w:style>' +
    '</w:styles>'
  );

  zip.folder('word').file('numbering.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:numbering xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
    '<w:abstractNum w:abstractNumId="0">' +
    '<w:lvl w:ilvl="0">' +
    '<w:start w:val="1"/><w:numFmt w:val="bullet"/><w:lvlText w:val="&#x25B8;"/>' +
    '<w:lvlJc w:val="left"/>' +
    '<w:pPr><w:ind w:left="720" w:hanging="360"/></w:pPr>' +
    '<w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:color w:val="D97706"/></w:rPr>' +
    '</w:lvl>' +
    '</w:abstractNum>' +
    '<w:num w:numId="1"><w:abstractNumId w:val="0"/></w:num>' +
    '</w:numbering>'
  );

  var bodyXml = text.split('\n').map(lineToPara).join('');

  zip.folder('word').file('document.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document' +
    ' xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"' +
    ' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"' +
    ' xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"' +
    ' mc:Ignorable="">' +
    '<w:body>' +
    bodyXml +
    '<w:sectPr>' +
    '<w:pgSz w:w="11906" w:h="16838"/>' +
    '<w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"' +
    ' w:header="709" w:footer="709" w:gutter="0"/>' +
    '</w:sectPr>' +
    '</w:body></w:document>'
  );

  var blob = await zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    compression: 'DEFLATE',
    compressionOptions: { level: 6 }
  });

  return { blob, filename: filename.replace(/\.docx$/i, '') + '.docx' };
}

window.addEventListener('load', async function() {
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  try {
    var raw = sessionStorage.getItem('vacaria_docx');
    if (!raw) throw new Error(
      'Nenhum dado encontrado. Feche esta aba, gere o plano e clique em "Editar DOCX" novamente.'
    );
    var data = JSON.parse(raw);
    if (!data || !data.text) throw new Error('Dados inválidos.');
    sessionStorage.removeItem('vacaria_docx');

    msg.textContent = 'Gerando ' + (data.filename || 'documento') + '...';

    var result = await buildDocx(data.text, data.filename || 'VacarIA_documento');

    msg.textContent = 'Documento pronto! Clique para baixar novamente se necessário.';
    btn.disabled = false;

    function doDownload() {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(result.blob);
      a.download = result.filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      btn.textContent = '✓ Baixado!';
      setTimeout(function() { btn.textContent = '⬇ Baixar DOCX'; }, 3000);
    }

    btn.addEventListener('click', doDownload);
    doDownload();

  } catch(e) {
    msg.textContent = e.message;
    btn.textContent = '⟳ Tentar novamente';
    btn.disabled = false;
    btn.addEventListener('click', function() { location.reload(); });
    console.error(e);
  }
});
</script>
</body>
</html>
