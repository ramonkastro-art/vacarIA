<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Gerando DOCX...</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body{font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fefce8;gap:16px;margin:0}
  h2{color:#b45309;font-size:20px;margin:0}
  p{color:#92400e;font-size:14px;margin:0}
  button{padding:14px 28px;background:#16a34a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.3)}
  button:hover{background:#15803d}
  button:disabled{opacity:.5;cursor:not-allowed}
  .logo{font-size:28px;font-weight:700;color:#b45309}
  .logo span{color:#0e7490}
</style>
</head>
<body>
<div class="logo">Vacar<span>IA</span></div>
<h2>Gerando documento editável...</h2>
<p id="msg">Processando conteúdo</p>
<button id="btn" disabled>⬇ Baixar DOCX</button>

<script>
function esc(s) {
  if (!s) return '';
  var r = s;
  r = r.split('&').join('&amp;');
  r = r.split('<').join('&lt;');
  r = r.split('>').join('&gt;');
  r = r.split('"').join('&quot;');
  return r;
}

function parseMarkdown(text) {
  var lines = text.split('\n');
  var paras = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.indexOf('# ') === 0 && line.indexOf('## ') !== 0) {
      paras.push({type:'h1', text: line.slice(2)});
    } else if (line.indexOf('## ') === 0 && line.indexOf('### ') !== 0) {
      paras.push({type:'h2', text: line.slice(3)});
    } else if (line.indexOf('### ') === 0) {
      paras.push({type:'h3', text: line.slice(4)});
    } else if (line.indexOf('**') === 0 && line.lastIndexOf('**') === line.length-2 && line.length > 4) {
      paras.push({type:'bold', text: line.slice(2,-2)});
    } else if (line.indexOf('• ') === 0 || line.indexOf('- ') === 0) {
      paras.push({type:'bullet', text: line.slice(2).replace(/\*\*(.+?)\*\*/g,'$1')});
    } else if (line.trim() === '---') {
      paras.push({type:'hr'});
    } else if (line.trim() === '') {
      paras.push({type:'empty'});
    } else if (line.indexOf('═') === 0) {
      // skip
    } else {
      paras.push({type:'normal', text: line.replace(/\*\*(.+?)\*\*/g,'$1')});
    }
  }
  return paras;
}

function buildBodyXml(paras, dataAtual) {
  var b = '';
  // VacarIA header
  b += '<w:p><w:pPr><w:spacing w:after="80"/></w:pPr>';
  b += '<w:r><w:rPr><w:b/><w:sz w:val="32"/><w:color w:val="B45309"/></w:rPr><w:t>VacarIA</w:t></w:r></w:p>';
  b += '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="D97706"/></w:pPr><w:spacing w:after="160"/></w:pPr></w:p>';

  for (var i = 0; i < paras.length; i++) {
    var p = paras[i];
    var t = esc(p.text || '');
    if (p.type === 'h1') {
      b += '<w:p><w:pPr><w:spacing w:before="240" w:after="80"/></w:pPr>';
      b += '<w:r><w:rPr><w:b/><w:sz w:val="30"/><w:color w:val="B45309"/></w:rPr><w:t xml:space="preserve">' + t + '</w:t></w:r></w:p>';
    } else if (p.type === 'h2') {
      b += '<w:p><w:pPr><w:spacing w:before="200" w:after="60"/></w:pPr>';
      b += '<w:r><w:rPr><w:b/><w:sz w:val="24"/><w:color w:val="0E7490"/><w:caps/></w:rPr><w:t xml:space="preserve">' + t + '</w:t></w:r></w:p>';
    } else if (p.type === 'h3') {
      b += '<w:p><w:pPr><w:spacing w:before="160" w:after="40"/></w:pPr>';
      b += '<w:r><w:rPr><w:b/><w:sz w:val="22"/><w:color w:val="7C3AED"/></w:rPr><w:t xml:space="preserve">' + t + '</w:t></w:r></w:p>';
    } else if (p.type === 'bold') {
      b += '<w:p><w:r><w:rPr><w:b/></w:rPr><w:t xml:space="preserve">' + t + '</w:t></w:r></w:p>';
    } else if (p.type === 'bullet') {
      b += '<w:p><w:pPr><w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr></w:pPr>';
      b += '<w:r><w:t xml:space="preserve">' + t + '</w:t></w:r></w:p>';
    } else if (p.type === 'hr') {
      b += '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="E2E8F0"/></w:pPr></w:p>';
    } else if (p.type === 'empty') {
      b += '<w:p><w:pPr><w:spacing w:after="60"/></w:pPr></w:p>';
    } else if (p.text) {
      b += '<w:p><w:r><w:t xml:space="preserve">' + t + '</w:t></w:r></w:p>';
    }
  }

  // Footer
  b += '<w:p><w:pPr><w:spacing w:before="200"/><w:pBdr><w:top w:val="single" w:sz="4" w:space="1" w:color="FDE68A"/></w:pPr></w:p>';
  b += '<w:p><w:r><w:rPr><w:sz w:val="16"/><w:color w:val="A8A29E"/></w:rPr>';
  b += '<w:t>VacarIA · Desenvolvido por Ramon Castro · ' + esc(dataAtual) + '</w:t></w:r></w:p>';
  return b;
}

async function generate(text, filename) {
  var dataAtual = new Date().toLocaleDateString('pt-BR');
  var paras = parseMarkdown(text);
  var bodyXml = buildBodyXml(paras, dataAtual);

  var docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
    '<w:body>' + bodyXml +
    '<w:sectPr><w:pgSz w:w="11906" w:h="16838"/>' +
    '<w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/>' +
    '</w:sectPr></w:body></w:document>';

  var numbering = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:numbering xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
    '<w:abstractNum w:abstractNumId="0">' +
    '<w:lvl w:ilvl="0"><w:start w:val="1"/><w:numFmt w:val="bullet"/>' +
    '<w:lvlText w:val="&#x2022;"/><w:lvlJc w:val="left"/>' +
    '<w:pPr><w:ind w:left="720" w:hanging="360"/></w:pPr></w:lvl>' +
    '</w:abstractNum>' +
    '<w:num w:numId="1"><w:abstractNumId w:val="0"/></w:num>' +
    '</w:numbering>';

  var styles = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
    '<w:docDefaults><w:rPrDefault><w:rPr>' +
    '<w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="24"/>' +
    '</w:rPr></w:rPrDefault></w:docDefaults>' +
    '</w:styles>';

  var ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>' +
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
    '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>' +
    '<Override PartName="/word/numbering.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/>' +
    '</Types>';

  var rootRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
    '</Relationships>';

  var wordRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>' +
    '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>' +
    '</Relationships>';

  var zip = new JSZip();
  zip.file('[Content_Types].xml', ct);
  zip.file('_rels/.rels', rootRels);
  zip.file('word/document.xml', docXml);
  zip.file('word/styles.xml', styles);
  zip.file('word/numbering.xml', numbering);
  zip.file('word/_rels/document.xml.rels', wordRels);

  var blob = await zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });

  return {blob, filename: filename + '.docx'};
}

window.addEventListener('load', async function() {
  try {
    // Read data from URL hash
    var hash = decodeURIComponent(window.location.hash.slice(1));
    var data = JSON.parse(hash);

    document.getElementById('msg').textContent = 'Gerando ' + data.filename + '...';

    var result = await generate(data.text, data.filename);

    var btn = document.getElementById('btn');
    btn.disabled = false;
    document.getElementById('msg').textContent = 'Pronto! Clique para baixar.';

    btn.addEventListener('click', function() {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(result.blob);
      a.download = result.filename;
      a.click();
      btn.textContent = '✓ Baixado!';
    });

    // Auto-download
    btn.click();

  } catch(e) {
    document.getElementById('msg').textContent = 'Erro: ' + e.message;
    console.error(e);
  }
});
</script>
</body>
</html>
