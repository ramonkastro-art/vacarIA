<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grammar Shooting Range - Mobile Optimized</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .shooting-range {
            background: linear-gradient(to bottom, #243b55, #141e30);
            height: 100vh;
            width: 100vw;
            position: relative;
            cursor: crosshair;
            touch-action: none; /* Previne scroll e zoom durante o jogo */
        }
        .target {
            position: absolute;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }
        @media (min-width: 768px) {
            .target { width: 120px; height: 120px; }
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .target-circle {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #fff;
        }
        .outer { width: 85%; height: 85%; background: #e74c3c; z-index: 1; }
        .inner { width: 50%; height: 50%; background: #fff; z-index: 2; display: flex; align-items: center; justify-content: center; }
        .bullseye { width: 30%; height: 30%; background: #e74c3c; z-index: 3; border-radius: 50%; }

        .target-word {
            position: absolute;
            z-index: 10;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 14px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
            bottom: -15px;
            white-space: nowrap;
        }
        .hud {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            pointer-events: none;
            z-index: 100;
            padding: 0 10px;
        }
        .hud-item {
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 9999px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        @media (min-width: 768px) {
            .hud-item { font-size: 16px; padding: 6px 18px; }
            .target-word { font-size: 16px; bottom: -20px; }
        }
        .menu-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .timer-bar {
            position: absolute;
            top: 0;
            left: 10%;
            height: 4px;
            background: #f1c40f;
            width: 80%;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="artifact_react"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const DATABASE = {
            pt: {
                verbos: ['CORRER', 'COMER', 'ESTUDAR', 'CANTAR', 'SORRIR', 'PULAR', 'FALAR', 'ESCREVER', 'LER', 'DIRIGIR', 'JOGAR', 'NADAR', 'VOAR', 'ANDAR', 'PENSAR'],
                substantivos: ['MESA', 'CADEIRA', 'LIVRO', 'CARRO', 'CASA', 'ÁRVORE', 'FLOR', 'SOL', 'CIDADE', 'ESTRADA', 'JANELA', 'ESCOLA', 'GARRAFA', 'RELOGIO'],
                preposicoes: ['PARA', 'COM', 'DE', 'EM', 'POR', 'SOBRE', 'ANTE', 'APÓS', 'ATÉ', 'DESDE', 'PERANTE', 'SEM', 'SOB', 'TRAZ']
            },
            en: {
                verbs: ['RUN', 'EAT', 'STUDY', 'SING', 'SMILE', 'JUMP', 'TALK', 'WRITE', 'READ', 'DRIVE', 'PLAY', 'SWIM', 'FLY', 'WALK', 'THINK'],
                nouns: ['TABLE', 'CHAIR', 'BOOK', 'CAR', 'HOUSE', 'TREE', 'FLOWER', 'SUN', 'CITY', 'ROAD', 'WINDOW', 'SCHOOL', 'BOTTLE', 'WATCH'],
                adjectives: ['HAPPY', 'SAD', 'BLUE', 'FAST', 'SLOW', 'BIG', 'SMALL', 'COLD', 'HOT', 'BRIGHT', 'DARK', 'LOUD', 'QUIET', 'HEAVY']
            }
        };

        const App = () => {
            const [gameState, setGameState] = useState('MENU');
            const [config, setConfig] = useState({ lang: 'pt', category: 'verbos' });
            const [score, setScore] = useState(0);
            const [hits, setHits] = useState(0);
            const [lives, setLives] = useState(3);
            const [targets, setTargets] = useState([]);
            const [timeLeft, setTimeLeft] = useState(60);

            const nextId = useRef(0);
            const gameLoopRef = useRef();
            const lastSpawn = useRef(0);
            const audioCtx = useRef(null);

            const playSound = (freq, type = 'sine', duration = 0.1) => {
                try {
                    if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                    const ctx = audioCtx.current;
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {}
            };

            const spawnTarget = useCallback(() => {
                const isCorrectType = Math.random() > 0.4;
                const categories = Object.keys(DATABASE[config.lang]);
                const otherCategory = categories.find(c => c !== config.category);
                const list = isCorrectType ? DATABASE[config.lang][config.category] : DATABASE[config.lang][otherCategory];
                const word = list[Math.floor(Math.random() * list.length)];
                const lifetime = 5000 + Math.random() * 4000;

                const newTarget = {
                    id: nextId.current++,
                    word,
                    isCorrect: isCorrectType,
                    x: 10 + Math.random() * 70, // Margin to avoid edges
                    y: 20 + Math.random() * 55, // Margin to avoid HUD
                    createdAt: Date.now(),
                    lifetime
                };
                setTargets(prev => [...prev, newTarget]);
            }, [config]);

            const startGame = () => {
                setScore(0);
                setHits(0);
                setLives(3);
                setTimeLeft(60);
                setTargets([]);
                setGameState('PLAYING');
                lastSpawn.current = performance.now();
                if (audioCtx.current && audioCtx.current.state === 'suspended') {
                    audioCtx.current.resume();
                }
            };

            const handleShot = (e, target) => {
                e.preventDefault();
                e.stopPropagation();
                if (gameState !== 'PLAYING') return;

                if (target.isCorrect) {
                    setScore(s => s + 10);
                    setHits(h => h + 1);
                    playSound(600, 'sine', 0.1);
                } else {
                    setScore(s => Math.max(0, s - 5));
                    setLives(l => l - 1);
                    playSound(150, 'square', 0.3);
                }
                setTargets(prev => prev.filter(t => t.id !== target.id));
            };

            const handleMissClick = (e) => {
                if (gameState !== 'PLAYING') return;
                playSound(100, 'triangle', 0.05);
            };

            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                const interval = setInterval(() => {
                    setTimeLeft(t => {
                        if (t <= 1) {
                            if (hits < 5) setGameState('GAMEOVER');
                            else {
                                setGameState('SUCCESS');
                                playSound(800, 'sine', 0.2);
                            }
                            return 0;
                        }
                        return t - 1;
                    });
                }, 1000);

                const loop = (time) => {
                    if (time - lastSpawn.current > 2800) {
                        spawnTarget();
                        lastSpawn.current = time;
                    }
                    setTargets(prev => {
                        const now = Date.now();
                        const expired = prev.filter(t => now - t.createdAt > t.lifetime);
                        expired.forEach(t => {
                            if (t.isCorrect) {
                                setScore(s => Math.max(0, s - 3));
                                playSound(200, 'sawtooth', 0.2);
                            }
                        });
                        return prev.filter(t => now - t.createdAt <= t.lifetime);
                    });
                    gameLoopRef.current = requestAnimationFrame(loop);
                };
                gameLoopRef.current = requestAnimationFrame(loop);
                return () => {
                    clearInterval(interval);
                    cancelAnimationFrame(gameLoopRef.current);
                };
            }, [gameState, spawnTarget, hits]);

            useEffect(() => {
                if (lives <= 0 && gameState === 'PLAYING') setGameState('GAMEOVER');
            }, [lives, gameState]);

            return (
                <div className="shooting-range" onPointerDown={handleMissClick}>
                    <div className="hud">
                        <div className="hud-item border-yellow-500 text-yellow-500">
                            <i className="fas fa-star"></i> {score}
                        </div>
                        <div className="hud-item border-blue-400 text-blue-400">
                            <i className="fas fa-crosshairs"></i> {config.category.toUpperCase()}
                        </div>
                        <div className="hud-item border-green-500 text-green-500">
                            <i className="fas fa-clock"></i> {timeLeft}s
                        </div>
                        <div className="hud-item border-red-500 text-red-500">
                            {'❤️'.repeat(lives)}
                        </div>
                    </div>

                    {targets.map(t => (
                        <div 
                            key={t.id} 
                            className="target" 
                            style={{ left: `${t.x}%`, top: `${t.y}%` }}
                            onPointerDown={(e) => handleShot(e, t)}
                        >
                            <div className="target-circle outer"></div>
                            <div className="target-circle inner border-none">
                                <div className="bullseye"></div>
                            </div>
                            <div className="target-word">{t.word}</div>
                            <div className="timer-bar" 
                                 style={{ transition: `width ${t.lifetime}ms linear`, width: '0%' }}
                                 ref={el => el && setTimeout(() => el.style.width = '100%', 50)}
                            ></div>
                        </div>
                    ))}

                    {(gameState === 'MENU' || gameState === 'SUCCESS' || gameState === 'GAMEOVER') && (
                        <div className="menu-overlay">
                            <div className="bg-gray-800 p-6 md:p-10 rounded-2xl border-2 border-blue-500 text-center w-full max-w-sm shadow-2xl">
                                {gameState === 'MENU' && (
                                    <>
                                        <h1 className="text-2xl md:text-3xl font-black text-blue-400 mb-4">GRAMMAR RANGE</h1>
                                        <div className="mb-4">
                                            <p className="text-xs text-gray-400 mb-2">IDIOMA</p>
                                            <div className="flex gap-2 justify-center">
                                                <button onClick={() => setConfig({...config, lang: 'pt', category: 'verbos'})} className={`flex-1 py-2 rounded text-sm ${config.lang === 'pt' ? 'bg-blue-600' : 'bg-gray-700'}`}>PT</button>
                                                <button onClick={() => setConfig({...config, lang: 'en', category: 'verbs'})} className={`flex-1 py-2 rounded text-sm ${config.lang === 'en' ? 'bg-blue-600' : 'bg-gray-700'}`}>EN</button>
                                            </div>
                                        </div>
                                        <div className="mb-6">
                                            <p className="text-xs text-gray-400 mb-2">CATEGORIA</p>
                                            <div className="grid grid-cols-2 gap-2">
                                                {Object.keys(DATABASE[config.lang]).map(cat => (
                                                    <button key={cat} onClick={() => setConfig({...config, category: cat})} className={`py-2 rounded text-xs truncate ${config.category === cat ? 'bg-green-600' : 'bg-gray-700'}`}>{cat.toUpperCase()}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={startGame} className="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-black font-black text-lg rounded-xl transition-transform active:scale-95">INICIAR</button>
                                    </>
                                )}
                                {gameState === 'SUCCESS' && (
                                    <>
                                        <i className="fas fa-trophy text-5xl text-yellow-500 mb-4 animate-bounce"></i>
                                        <h2 className="text-2xl font-black text-green-500 mb-2">VITÓRIA!</h2>
                                        <p className="text-sm text-gray-300 mb-4">Você é um mestre da gramática!</p>
                                        <p className="text-4xl font-black mb-6">{score} pts</p>
                                        <button onClick={() => setGameState('MENU')} className="w-full py-3 bg-green-600 rounded-lg font-bold">MENU</button>
                                    </>
                                )}
                                {gameState === 'GAMEOVER' && (
                                    <>
                                        <i className="fas fa-exclamation-triangle text-5xl text-red-600 mb-4"></i>
                                        <h2 className="text-xl font-bold text-red-500 mb-2">{hits < 5 ? 'TREINO INCOMPLETO' : 'FIM DE JOGO'}</h2>
                                        <p className="text-sm text-gray-400 mb-4">{hits < 5 ? 'Você precisa de pelo menos 5 acertos!' : 'Muitos erros no estande.'}</p>
                                        <p className="text-4xl font-black mb-6">{score} pts</p>
                                        <button onClick={() => setGameState('MENU')} className="w-full py-3 bg-red-600 rounded-lg font-bold">TENTAR DE NOVO</button>
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('artifact_react'));
    </script>
</body>
</html>
